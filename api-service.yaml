apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: synergychat-api
  ports:
    - protocol: TCP
      port: 80 # The port on which the service will listen on
      targetPort: 8080 # The port on which the pods are listening on
      # nodePort: 30080 # The port on which the service will be exposed on the nodes